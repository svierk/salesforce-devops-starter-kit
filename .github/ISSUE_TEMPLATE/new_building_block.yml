name: 🧱 New building block proposal
description: Propose a new building block (GitHub Action) for the kit.
title: '[Building Block]: '
labels: ['enhancement', 'new building block']
body:
  - type: markdown
    attributes:
      value: Have an idea for a reusable pipeline step? Great! Please describe it so we can align before any implementation. A good building block wraps a single `sf` CLI capability with sensible inputs and outputs.
  - type: input
    id: name
    attributes:
      label: Proposed building block name
      placeholder: e.g. sfdx-backup-metadata
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What should it do?
      description: Describe the single pipeline step it covers and the main use case.
    validations:
      required: true
  - type: textarea
    id: cli
    attributes:
      label: Underlying Salesforce CLI capability
      description: Which `sf` command(s) would it wrap?
      placeholder: e.g. sf project retrieve start
    validations:
      required: false
  - type: textarea
    id: why
    attributes:
      label: Why is it broadly useful?
      description: Explain why this belongs in a general-purpose kit rather than a single project's pipeline.
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Would you like to contribute it?
      options:
        - 'Yes, I would like to implement it'
        - 'Maybe, with some guidance'
        - 'No, just suggesting the idea'
    validations:
      required: true
