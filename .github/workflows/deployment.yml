name: Deployment

# Reusable workflow that deploys Salesforce metadata to a target org (sandbox or
# production). Supports a dry-run (validation only) mode and delta deployments.

on:
  workflow_call:
    inputs:
      source-dir:
        description: Source directory to deploy.
        required: false
        type: string
        default: force-app
      target-org-alias:
        description: Alias used for the authenticated target org.
        required: false
        type: string
        default: target-org
      test-level:
        description: Apex test level for the deployment.
        required: false
        type: string
        default: RunLocalTests
      dry-run:
        description: Validate the deployment without saving the components (check-only).
        required: false
        type: boolean
        default: false
      delta:
        description: Deploy only the components changed since delta-from.
        required: false
        type: boolean
        default: false
      delta-from:
        description: Git ref to compare from when delta is enabled, e.g. a previous release tag.
        required: false
        type: string
        default: ''
      environment:
        description: Optional GitHub Environment to run in — enables protection rules (required reviewers) and environment-scoped secrets. Leave empty to run without one.
        required: false
        type: string
        default: ''
    secrets:
      SFDX_CONSUMER_KEY:
        description: Consumer key (client ID) of the connected app used for the JWT flow.
        required: true
      SFDX_JWT_SECRET_KEY:
        description: Contents of the private server key (server.key) used for the JWT flow.
        required: true
      SFDX_USERNAME:
        description: Username of the integration user to authenticate as.
        required: true

# Least-privilege token: this workflow only reads the repository and talks to
# Salesforce via the CLI, it never writes back to GitHub.
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # An empty string means no environment; pass one to gate production behind
    # protection rules and resolve environment-scoped secrets.
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SF CLI
        uses: svierk/sfdx-cli-setup@main

      - name: Salesforce Org Login
        uses: svierk/sfdx-login@main
        with:
          client-id: ${{ secrets.SFDX_CONSUMER_KEY }}
          jwt-secret-key: ${{ secrets.SFDX_JWT_SECRET_KEY }}
          username: ${{ secrets.SFDX_USERNAME }}
          alias: ${{ inputs.target-org-alias }}

      - name: Deploy Metadata
        uses: svierk/sfdx-deploy@main
        with:
          source-dir: ${{ inputs.delta == false && inputs.source-dir || '' }}
          delta: ${{ inputs.delta }}
          delta-from: ${{ inputs.delta-from }}
          target-org: ${{ inputs.target-org-alias }}
          test-level: ${{ inputs.test-level }}
          dry-run: ${{ inputs.dry-run }}
